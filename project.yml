name: AirBender
options:
  bundleIdPrefix: com.airbender
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  AirBender:
    type: application
    platform: macOS
    sources:
      - path: AirBender.app
        excludes:
          - "*.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.airbender.app
        INFOPLIST_FILE: AirBender.app/Info.plist
        CODE_SIGN_ENTITLEMENTS: AirBender.app/AirBender.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: true
    dependencies:
      - target: com.airbender.helper
        embed: false
        copy:
          destination: wrapper
          subpath: Contents/Library/LaunchServices
    frameworks:
      - ServiceManagement.framework

  com.airbender.helper:
    type: tool
    platform: macOS
    sources:
      - path: com.airbender.helper
        excludes:
          - "*.plist"
      - path: AirBender.app/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.airbender.helper
        INFOPLIST_FILE: com.airbender.helper/Info.plist
        SKIP_INSTALL: true
        SWIFT_INCLUDE_PATHS: "$(SRCROOT)/com.airbender.helper/SMCClient"
        HEADER_SEARCH_PATHS: "$(SRCROOT)/com.airbender.helper/SMCClient"
    frameworks:
      - IOKit.framework
      - Security.framework
